{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Project</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body"> <div class="login-card" style="width: 450px;"> <h2><i class="fas fa-plus-circle"></i> Add New Project</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="input-group">
                <label>Project Title</label>
                <input type="text" name="title" placeholder="Enter project name" required>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea name="description" rows="4" placeholder="Briefly describe the project" style="width: 100%; border-radius: 6px; border: 1px solid #ddd; padding: 10px;"></textarea>
            </div>

            <div class="input-group">
                <label>Project Image</label>
                <input type="file"
            name='image_field_name'>
            </div>

          

            <button type="submit" class="login-btn">Save Project</button>
        </form>

        <a href="{% url 'home' %}" class="back-link" style="display: block; margin-top: 15px; color: #666; text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Cancel and Go Back
        </a>
    </div>

</body>
</html>
